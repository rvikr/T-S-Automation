tiers:
  tier_1:
    description: "Criminal-severity synthetic stand-ins; always human queue and quarantine."
    categories:
      - "Child Exploitation"
      - "Terrorism & Violent Extremism"
  tier_2:
    description: "Ambiguous or context-sensitive cases; senior reviewer required."
    categories:
      - "Suicide/Self-Injury"
      - "Harassment & Discrimination"
      - "Harmful Off-Platform Behavior"
      - "Sensitive Events"
      - "Political Content"
      - "Off-Platform Directing"
  tier_3:
    description: "Clear synthetic policy violations; auto-reject when confident."
    categories:
      - "Violent Content & Gore"
      - "Romantic/Sexual Content"
      - "Illegal & Regulated Goods"
      - "Profanity"
      - "Cheating & Scams"
      - "Spam"
      - "IP Violations"
      - "Advertising"
      - "Sharing Personal Info"
      - "System Misuse"
